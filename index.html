<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級出缺席管理系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9e9e9; 
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px; 
            position: relative;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 2px solid #ccc;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            outline: none;
        }
        .tab-btn.active {
            color: #333;
            border-bottom: 3px solid #555;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .control-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .control-bar label {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .control-bar input[type="date"] {
            padding: 5px;
            font-size: 16px;
            border: 1px solid #999;
        }
        .control-btn, .control-select {
            padding: 6px 15px;
            font-size: 14px;
            background-color: #e0e0e0;
            border: 1px solid #999;
            cursor: pointer;
            border-radius: 3px;
        }
        .control-btn:hover {
            background-color: #d0d0d0;
        }
        .control-select {
            background-color: #fff;
            padding: 5px 10px;
        }
        .btn-blue {
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
        }
        .btn-blue:hover {
            background-color: #0056b3;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            align-items: stretch; 
            height: 445px; 
        }
        .left-panel {
            flex: 1;
            background: #fff;
            border: 1px solid #ccc;
            overflow-y: auto;
        }
        .student-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        .student-table th {
            background-color: #1abc9c; 
            color: white;
            padding: 8px;
            border: 1px solid #ccc;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .student-table td {
            padding: 8px;
            border: 1px solid #eee;
            cursor: pointer;
        }
        .student-table tr:hover {
            background-color: #f5f5f5;
        }
        .student-table tr.selected td {
            background-color: #4a6b82;
            color: white;
            font-weight: bold;
        }
        .right-panel {
            width: 250px;
            background: #e9e9e9;
            padding: 15px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box; 
            overflow-y: auto; 
        }
        .right-panel-title {
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
        }
        .status-btn {
            width: 100%;
            padding: 12px;
            background-color: #f4f4f4;
            border: 1px solid #999;
            font-size: 16px;
            cursor: pointer;
            border-radius: 3px;
            transition: 0.2s;
        }
        .status-btn:hover {
            background-color: #e0e0e0;
        }
        .status-btn:disabled, .control-btn:disabled, .action-btn-small:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .clear-btn {
            background-color: #dc3545;
            color: white;
            border: 1px solid #c82333;
            margin-top: 10px;
            font-weight: bold;
        }
        .clear-btn:hover {
            background-color: #c82333;
        }

        .table-responsive {
            overflow-x: auto;
            background: #fff;
            border: 1px solid #ccc;
        }
        .view-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .view-table th, .view-table td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: left;
            white-space: nowrap;
        }
        .view-table th {
            background-color: #4CAF50;
            color: white;
            cursor: pointer; 
            user-select: none;
        }
        .view-table th:hover {
            background-color: #45a049;
        }
        .view-table tr:nth-child(even) {background-color: #f9f9f9;}
        
        .sort-icon {
            font-size: 12px;
            margin-left: 5px;
            display: inline-block;
        }
        
        .action-btn-small {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            color: white;
            font-size: 13px;
            margin-right: 5px;
        }
        .edit-btn { background-color: #007bff; }
        .edit-btn:hover { background-color: #0056b3; }
        .del-btn { background-color: #dc3545; }
        .del-btn:hover { background-color: #c82333; }

        .loading-text, .msg-text {
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
        }

        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.5); 
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fefefe;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
        }

        /* 手機版響應式設計：強制左右兩欄 */
        /* 複數天數紀錄：日曆 */
        .multi-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }
        .multi-controls label {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .multi-calendar-wrap {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 12px;
            max-width: 440px;
            margin: 0 auto 15px;
        }
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .cal-header #calTitle {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        .cal-nav-btn {
            background: #e0e0e0;
            border: 1px solid #999;
            border-radius: 3px;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
        }
        .cal-nav-btn:hover { background: #d0d0d0; }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .cal-weekday {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #666;
            padding: 4px 0;
        }
        .cal-day {
            text-align: center;
            padding: 10px 0;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            background: #fafafa;
        }
        .cal-day:hover { background: #eaf2ff; }
        .cal-day.blank {
            background: transparent;
            border: none;
            cursor: default;
        }
        .cal-day.today { border-color: #1abc9c; font-weight: bold; }
        .cal-day.selected {
            background: #007bff;
            color: #fff;
            border-color: #0056b3;
            font-weight: bold;
        }
        .cal-day.selected:hover { background: #0056b3; }
        .multi-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 440px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .multi-footer #multiSelectedCount {
            font-weight: bold;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 10px; }
            .main-layout {
                flex-direction: row; /* 強制保持左右兩欄排列 */
                height: 75vh; /* 根據手機螢幕高度自動拉伸 */
                gap: 5px; /* 縮小左右間距 */
            }
            .left-panel {
                flex: 1; /* 左側表格佔據剩餘空間 */
                height: 100%; 
            }
            .right-panel {
                width: 100px; /* 極小化右側按鈕區寬度以適應手機 */
                padding: 5px;
                gap: 8px;
                position: static; 
                box-shadow: none;
            }
            .right-panel-title {
                font-size: 11px;
                text-align: center;
                line-height: 1.2;
                margin-bottom: 2px;
            }
            .status-btn {
                padding: 10px 0; /* 調整按鈕內距確保好按 */
                font-size: 14px;
            }
            .clear-btn {
                font-size: 11px;
                padding: 10px 0;
                margin-top: 5px;
            }
            .student-table th, .student-table td {
                padding: 6px 2px;
                font-size: 13px;
            }
            .control-bar {
                gap: 5px;
            }
            .control-btn, .control-select {
                padding: 6px 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="tabAdd">📝 紀錄出缺席</button>
        <button class="tab-btn" id="tabMulti">🗓️ 複數天數紀錄</button>
        <button class="tab-btn" id="tabView">📊 檢視歷史紀錄</button>
    </div>

    <!-- 區塊 1：打卡與狀態介面 -->
    <div id="sectionAdd" class="tab-content active">
        <div class="control-bar">
            <label>📅 日期：<input type="date" id="targetDate"></label>
            <button class="control-btn btn-blue" id="syncCloudRosterBtn">☁️ 從雲端同步名單</button>
            <button class="control-btn" id="syncTodayBtn">🔄 重新整理紀錄</button>
            <span id="quickMsg" class="msg-text" style="color: green; margin-left: auto;"></span>
        </div>

        <div class="main-layout">
            <div class="left-panel">
                <table class="student-table" id="studentTable">
                    <thead>
                        <tr>
                            <th width="20%">座號</th>
                            <th width="30%">姓名</th>
                            <th width="50%">當日狀態</th>
                        </tr>
                    </thead>
                    <tbody id="studentListBody">
                    </tbody>
                </table>
            </div>

            <div class="right-panel">
                <div class="right-panel-title">設定狀態 (先點左側)</div>
                <button class="status-btn" onclick="setStatus('病假')">病假</button>
                <button class="status-btn" onclick="setStatus('事假')">事假</button>
                <button class="status-btn" onclick="setStatus('公假')">公假</button>
                <button class="status-btn" onclick="setStatus('喪假')">喪假</button>
                <button class="status-btn" onclick="setStatus('生理假')">生理假</button>
                <button class="status-btn" onclick="setStatus('曠課')">曠課</button>
                <button class="status-btn clear-btn" onclick="setStatus('銷假')">❌ 銷假 / 清除</button>
            </div>
        </div>
    </div>

    <!-- 區塊 1.5：複數天數紀錄 -->
    <div id="sectionMulti" class="tab-content">
        <div class="multi-controls">
            <label>👤 學生：
                <select id="multiStudent" class="control-select">
                    <option value="">請選擇學生</option>
                </select>
            </label>
            <label>📋 假別：
                <select id="multiLeaveType" class="control-select">
                    <option value="病假">病假</option>
                    <option value="事假">事假</option>
                    <option value="公假">公假</option>
                    <option value="喪假">喪假</option>
                    <option value="生理假">生理假</option>
                    <option value="曠課">曠課</option>
                </select>
            </label>
            <span id="multiMsg" class="msg-text" style="margin-left:auto;"></span>
        </div>

        <div class="multi-calendar-wrap">
            <div class="cal-header">
                <button class="cal-nav-btn" id="calPrev">‹</button>
                <span id="calTitle"></span>
                <button class="cal-nav-btn" id="calNext">›</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </div>

        <div class="multi-footer">
            <span id="multiSelectedCount">已選 0 天</span>
            <button class="control-btn" id="multiClearSel">清除選取</button>
            <button class="control-btn btn-blue" id="multiSubmit">✅ 送出登錄</button>
        </div>
    </div>

    <!-- 區塊 2：檢視所有歷史紀錄 -->
    <div id="sectionView" class="tab-content">
        <div class="control-bar">
            <button class="control-btn" id="refreshHistoryBtn">🔄 載入歷史資料</button>
            <span id="historyStatus" style="font-size:13px; color:#666; margin-left:8px;"></span>
            <select id="filterStudent" class="control-select" style="margin-left: auto;">
                <option value="">📂 顯示全部學生</option>
            </select>
        </div>
        <div id="loadingMsg" class="loading-text" style="display: none;">資料載入中，請稍候...</div>
        <div class="table-responsive">
            <table class="view-table" id="recordsTable" style="display: none;">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">日期 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(1)">座號 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(2)">姓名 <span class="sort-icon"></span></th>
                        <th onclick="sortTable(3)">假別 <span class="sort-icon"></span></th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="recordsBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 編輯紀錄 Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>編輯紀錄</h3>
        <input type="hidden" id="editRowIdx">
        <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">學生：</label>
            <span id="editStudentLabel"></span>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">日期：</label>
            <input type="date" id="editDate" class="control-select" style="width: 100%; box-sizing:border-box;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom:5px; font-weight:bold;">假別：</label>
            <select id="editLeaveType" class="control-select" style="width: 100%; box-sizing:border-box;">
                <option value="病假">病假</option>
                <option value="事假">事假</option>
                <option value="公假">公假</option>
                <option value="喪假">喪假</option>
                <option value="生理假">生理假</option>
                <option value="曠課">曠課</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="control-btn" id="saveEditBtn" style="flex:1; background-color: #007bff; color: white;">儲存修改</button>
            <button class="control-btn" onclick="document.getElementById('editModal').style.display='none'" style="flex:1;">取消</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx4v-TXXzNVWdZ4K20eySuILg21RXM5LOYEk77JuDdGxBdbzYg_T60S-PSPQ3GNjiPrTQ/exec';
    let students = [];
    let selectedStudent = null;
    let currentSyncId = 0;
    let historyData = [];
    let isBusy = false; // 防止動作進行中被重複觸發

    let currentSortCol = 0;
    let sortAsc = true;
    const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    // --- 全表讀取快取（Apps Script 讀取較慢，短時間內共用結果，寫入後失效）---
    let dataCache = null;
    let dataCacheTime = 0;
    const CACHE_TTL = 60000; // 毫秒；任何寫入都會使快取失效，故可放長

    // --- localStorage 持久化：開啟 App 時先用上次的資料立即渲染，再背景更新 ---
    const LS_RECORDS_KEY = 'cachedRecords';
    let staleRecords = null; // 上次成功抓到的紀錄（可能不是最新）

    function loadRecordsFromLS() {
        try {
            const raw = localStorage.getItem(LS_RECORDS_KEY);
            if (!raw) return null;
            const obj = JSON.parse(raw);
            if (obj && Array.isArray(obj.data)) return obj.data;
        } catch (e) {}
        return null;
    }

    function saveRecordsToLS(data) {
        try {
            localStorage.setItem(LS_RECORDS_KEY, JSON.stringify({ time: Date.now(), data: data }));
        } catch (e) {} // 容量已滿等狀況忽略即可，不影響功能
    }

    // 取得「任何可用的資料」：優先記憶體快取，其次上次存下的舊資料
    function getAnyRecords() {
        if (dataCache && dataCache.data) return dataCache.data;
        return staleRecords;
    }

    const dateInput = document.getElementById('targetDate');
    const studentListBody = document.getElementById('studentListBody');
    const quickMsg = document.getElementById('quickMsg');

    // --- 共用工具 ---
    function escapeHtml(str) {
        return String(str ?? '').replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function seatEquals(a, b) {
        const sa = String(a).trim(), sb = String(b).trim();
        if (sa === sb) return true;
        const na = parseInt(sa, 10), nb = parseInt(sb, 10);
        return !isNaN(na) && !isNaN(nb) && na === nb;
    }

    function setBusy(state) {
        isBusy = state;
        document.querySelectorAll('.status-btn, .action-btn-small').forEach(b => b.disabled = state);
    }

    // 讀取整張表（含快取）；force=true 強制重抓
    async function fetchAllData(force = false) {
        const now = Date.now();
        if (!force && dataCache && (now - dataCacheTime) < CACHE_TTL) {
            return dataCache;
        }
        const res = await fetch(scriptURL);
        const result = await res.json();
        if (result.status === 'success') {
            dataCache = result;
            dataCacheTime = Date.now();
            staleRecords = result.data;
            saveRecordsToLS(result.data);
        }
        return result;
    }
    function invalidateCache() { dataCache = null; }

    // 啟動時只發一次請求，同時取回「學生名單」與「出缺席紀錄」
    async function bootstrapFromCloud() {
        try {
            const res = await fetch(scriptURL + '?action=getAll');
            const result = await res.json();
            if (result.status !== 'success') return;

            // 紀錄
            if (Array.isArray(result.data)) {
                dataCache = { status: 'success', data: result.data };
                dataCacheTime = Date.now();
                staleRecords = result.data;
                saveRecordsToLS(result.data);
            }

            // 名單：僅在有效且內容有變動時才更新，避免不必要的重繪與選取被清掉
            if (Array.isArray(result.students)) {
                const newList = parseStudentRows(result.students);
                if (newList.length > 0 && JSON.stringify(newList) !== JSON.stringify(students)) {
                    students = newList;
                    localStorage.setItem('classStudentList', JSON.stringify(students));
                    renderStudentTable();
                    updateFilterOptions();
                    updateMultiStudentOptions();
                }
            }

            // 用最新資料重新渲染目前所在分頁
            if (document.getElementById('sectionAdd').classList.contains('active')) {
                applyTodayStatus(getAnyRecords());
            } else if (document.getElementById('sectionView').classList.contains('active')) {
                buildHistoryFrom(getAnyRecords());
            }
        } catch (e) {
            // 背景更新失敗不打擾使用者，畫面仍有舊資料可用
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        dateInput.valueAsDate = new Date();
        staleRecords = loadRecordsFromLS();
        loadStudentsFromLocal();   // 先用本機名單立即渲染
        if (staleRecords) applyTodayStatus(staleRecords); // 先用舊紀錄立即顯示
        bootstrapFromCloud();      // 再背景抓最新（名單+紀錄一次請求）
    });

    function switchTab(btn, sectionId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(sectionId).classList.add('active');
    }

    document.getElementById('tabAdd').addEventListener('click', function() {
        switchTab(this, 'sectionAdd');
        syncTodayData();
    });

    document.getElementById('tabMulti').addEventListener('click', function() {
        switchTab(this, 'sectionMulti');
        updateMultiStudentOptions();
        ensureCalendarInit();
        renderCalendar();
        updateMultiCount();
    });

    document.getElementById('tabView').addEventListener('click', function() {
        switchTab(this, 'sectionView');
        loadHistoryData();
    });

    // --- 名單載入邏輯 ---
    function loadStudentsFromLocal() {
        const storedList = localStorage.getItem('classStudentList');
        if (storedList) {
            try {
                students = JSON.parse(storedList);
            } catch (e) {
                students = [];
            }
        }
        renderStudentTable();
        updateFilterOptions();
        updateMultiStudentOptions();
    }

    // 把「學生名單」工作表的原始列轉成 {seat, name} 陣列
    function parseStudentRows(rows) {
        const list = [];
        rows.forEach(row => {
            const seat = row[0];
            const name = row[1];
            if (seat && name) {
                const seatStr = String(seat).trim();
                const nameStr = String(name).trim();
                if (seatStr !== '座號' && seatStr !== '學號') {
                    list.push({ seat: seatStr, name: nameStr });
                }
            }
        });
        return list;
    }

    document.getElementById('syncCloudRosterBtn').addEventListener('click', loadStudentsFromCloud);

    function loadStudentsFromCloud() {
        showMsg('正在下載雲端名單...', 'blue');
        fetch(scriptURL + '?action=getStudents')
            .then(res => res.json())
            .then(result => {
                if (result.status === 'success') {
                    const newList = parseStudentRows(result.data);

                    if (newList.length > 0) {
                        students = newList;
                        localStorage.setItem('classStudentList', JSON.stringify(students));
                        renderStudentTable();
                        updateFilterOptions();
                        updateMultiStudentOptions();
                        showMsg('名單同步成功！', 'green');
                        syncTodayData();
                    } else {
                        showMsg('「學生名單」沒有有效資料', 'red');
                    }
                } else {
                    showMsg('讀取失敗: ' + (result.message || '未知錯誤'), 'red');
                }
            })
            .catch(err => {
                showMsg('下載名單失敗(網路錯誤)', 'red');
            });
    }

    function renderStudentTable() {
        studentListBody.innerHTML = '';
        if (students.length === 0) {
            studentListBody.innerHTML = '<tr><td colspan="3">請點擊「從雲端同步名單」</td></tr>';
            return;
        }

        students.forEach(student => {
            const tr = document.createElement('tr');
            tr.dataset.seat = student.seat;
            tr.dataset.name = student.name;

            const tdSeat = document.createElement('td');
            tdSeat.textContent = student.seat;
            const tdName = document.createElement('td');
            tdName.textContent = student.name;
            const tdStatus = document.createElement('td');
            tdStatus.className = 'status-cell';

            tr.appendChild(tdSeat);
            tr.appendChild(tdName);
            tr.appendChild(tdStatus);

            tr.addEventListener('click', function() {
                document.querySelectorAll('.student-table tr').forEach(row => row.classList.remove('selected'));
                this.classList.add('selected');
                selectedStudent = { seat: this.dataset.seat, name: this.dataset.name, element: this };
            });
            studentListBody.appendChild(tr);
        });
        selectedStudent = null;
    }

    function goToNextRow(rowEl) {
        const nextRow = rowEl.nextElementSibling;
        if (nextRow) {
            nextRow.click();
            nextRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    // --- 狀態設定與發送 API（後端已支援 upsert 與批次清除，前端一次請求即可）---
    async function setStatus(leaveType) {
        if (isBusy) return; // 防連點
        if (!selectedStudent) {
            showMsg('請先從左側名單點選學生！', 'red');
            return;
        }

        const dateVal = dateInput.value;
        const seat = selectedStudent.seat;
        const name = selectedStudent.name;
        const rowEl = selectedStudent.element;
        const statusCell = rowEl.querySelector('.status-cell');

        setBusy(true);
        try {
            // 銷假：呼叫後端批次清除，一次請求刪掉當日該生所有紀錄
            if (leaveType === '銷假') {
                showMsg('清除紀錄中...', 'blue');
                const res = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'deleteByStudentDate', date: dateVal, studentId: seat }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await res.json();
                if (result.status === 'success') {
                    invalidateCache();
                    const n = result.deleted || 0;
                    showMsg(n > 0 ? `已清除 ${name} 當日紀錄` : `當日無 ${name} 的紀錄`, 'green');
                    statusCell.textContent = '';
                    goToNextRow(rowEl);
                } else {
                    showMsg('清除失敗', 'red');
                }
                return;
            }

            // 一般假別：後端會自動 upsert（同日同座號存在就更新、否則新增），前端只送一次
            showMsg('傳送中...', 'blue');
            const res = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: 'add', date: dateVal, studentId: seat, studentName: name, leaveType: leaveType, note: '' }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const result = await res.json();

            if (result.status === 'success') {
                invalidateCache();
                showMsg(`已更新 ${name} 為：${leaveType}`, 'green');
                statusCell.textContent = leaveType;
                goToNextRow(rowEl);
            } else {
                showMsg('紀錄失敗，請重試。', 'red');
            }
        } catch (error) {
            showMsg('傳送失敗(網路錯誤)', 'red');
        } finally {
            setBusy(false);
        }
    }

    function isSameDate(dateStr1, dateStr2) {
        if (!dateStr1 || !dateStr2) return false;
        const s1 = String(dateStr1).trim(), s2 = String(dateStr2).trim();
        if (s1 === '' || s2 === '') return false;
        const d1 = new Date(s1.replace(/-/g, '/'));
        const d2 = new Date(s2.replace(/-/g, '/'));
        if (isNaN(d1.getTime()) || isNaN(d2.getTime())) return false;
        return d1.getFullYear() === d2.getFullYear() &&
               d1.getMonth() === d2.getMonth() &&
               d1.getDate() === d2.getDate();
    }

    function formatFullDate(dateStr) {
        if (!dateStr) return '';
        const s = String(dateStr).trim();
        if (s === '') return '';
        const d = new Date(s.replace(/-/g, '/'));
        if (isNaN(d.getTime())) return s;
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const day = daysOfWeek[d.getDay()];
        return `${yyyy}-${mm}-${dd} ${day}`;
    }

    // 統一把各種日期格式轉成 <input type="date"> 需要的 yyyy-mm-dd
    function toInputDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(String(dateStr).replace(/-/g, '/'));
        if (!isNaN(d.getTime())) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }
        return String(dateStr).slice(0, 10).replace(/\//g, '-');
    }

    document.getElementById('syncTodayBtn').addEventListener('click', syncTodayData);
    dateInput.addEventListener('change', () => {
        document.querySelectorAll('.status-cell').forEach(cell => cell.textContent = '');
        syncTodayData();
    });

    // 依指定資料把當日假別填入名單（可用舊資料先渲染，達到即時顯示）
    function applyTodayStatus(records) {
        if (!Array.isArray(records)) return;
        const targetD = dateInput.value;
        const latestStatus = {};
        records.forEach(row => {
            const rDate = row[1] || '';
            const rSeat = row[2] || '';
            const rType = row[4] || '';
            if (rDate === '日期' || rSeat === '座號' || rSeat === '學號') return;
            if (String(rDate).trim() !== '' && isSameDate(rDate, targetD) && rType !== '銷假') {
                latestStatus[rSeat] = rType;
            }
        });

        document.querySelectorAll('.student-table tbody tr').forEach(tr => {
            const seat = tr.dataset.seat;
            const cell = tr.querySelector('.status-cell');
            if (cell) cell.textContent = latestStatus[seat] || '';
        });
    }

    async function syncTodayData() {
        const syncId = ++currentSyncId;

        // 先用手邊已有的資料立即渲染，使用者不必空等
        const existing = getAnyRecords();
        if (existing) {
            applyTodayStatus(existing);
        } else {
            document.querySelectorAll('.status-cell').forEach(cell => cell.textContent = '');
        }
        showMsg('同步資料中...', 'blue');

        try {
            const result = await fetchAllData();
            if (syncId !== currentSyncId) return; // 已有更新的同步，放棄本次

            if (result.status === 'success' && result.data.length > 0) {
                applyTodayStatus(result.data);
                showMsg('資料已同步', 'green');
            } else {
                showMsg('', 'black');
            }
        } catch (error) {
            if (syncId === currentSyncId) showMsg('同步失敗', 'red');
        }
    }

    function showMsg(text, color) {
        quickMsg.textContent = text;
        quickMsg.style.color = color;
        setTimeout(() => { if (quickMsg.textContent === text) quickMsg.textContent = ''; }, 3000);
    }

    document.getElementById('refreshHistoryBtn').addEventListener('click', () => loadHistoryData(true));
    document.getElementById('filterStudent').addEventListener('change', renderHistoryTable);

    // 事件委派：編輯 / 刪除按鈕（取代原本內嵌 onclick 字串，避免姓名含特殊字元造成注入或壞掉）
    document.getElementById('recordsBody').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        if (btn.dataset.action === 'edit') {
            openEditModal(btn.dataset.row, btn.dataset.date, btn.dataset.seat, btn.dataset.name, btn.dataset.type);
        } else if (btn.dataset.action === 'delete') {
            deleteRecord(btn.dataset.row, btn.dataset.name, btn.dataset.display);
        }
    });

    function updateFilterOptions() {
        const filterSelect = document.getElementById('filterStudent');
        const currentVal = filterSelect.value;
        filterSelect.innerHTML = '<option value="">📂 顯示全部學生</option>';

        students.forEach(student => {
            const opt = document.createElement('option');
            opt.value = student.name;
            opt.textContent = `${student.seat}號 - ${student.name}`;
            filterSelect.appendChild(opt);
        });
        filterSelect.value = currentVal || '';
    }

    // ===================== 複數天數紀錄 =====================
    let calYear, calMonth;
    const multiSelectedDates = new Set();

    function pad2(n) { return String(n).padStart(2, '0'); }
    function toISO(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}`; }

    function ensureCalendarInit() {
        if (calYear === undefined) {
            const t = new Date();
            calYear = t.getFullYear();
            calMonth = t.getMonth();
        }
    }

    function updateMultiStudentOptions() {
        const sel = document.getElementById('multiStudent');
        const cur = sel.value;
        sel.innerHTML = '<option value="">請選擇學生</option>';
        students.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.seat;
            opt.dataset.name = s.name;
            opt.textContent = `${s.seat}號 - ${s.name}`;
            sel.appendChild(opt);
        });
        sel.value = cur || '';
    }

    function updateMultiCount() {
        document.getElementById('multiSelectedCount').textContent = `已選 ${multiSelectedDates.size} 天`;
    }

    function renderCalendar() {
        ensureCalendarInit();
        const grid = document.getElementById('calGrid');
        document.getElementById('calTitle').textContent = `${calYear} 年 ${calMonth + 1} 月`;
        grid.innerHTML = '';

        ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
            const el = document.createElement('div');
            el.className = 'cal-weekday';
            el.textContent = w;
            grid.appendChild(el);
        });

        const startDay = new Date(calYear, calMonth, 1).getDay(); // 0=週日
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const now = new Date();
        const todayISO = toISO(now.getFullYear(), now.getMonth(), now.getDate());

        for (let i = 0; i < startDay; i++) {
            const blank = document.createElement('div');
            blank.className = 'cal-day blank';
            grid.appendChild(blank);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const iso = toISO(calYear, calMonth, d);
            const el = document.createElement('div');
            el.className = 'cal-day';
            el.textContent = d;
            if (iso === todayISO) el.classList.add('today');
            if (multiSelectedDates.has(iso)) el.classList.add('selected');
            el.addEventListener('click', () => {
                if (multiSelectedDates.has(iso)) {
                    multiSelectedDates.delete(iso);
                    el.classList.remove('selected');
                } else {
                    multiSelectedDates.add(iso);
                    el.classList.add('selected');
                }
                updateMultiCount();
            });
            grid.appendChild(el);
        }
    }

    function showMultiMsg(text, color) {
        const el = document.getElementById('multiMsg');
        el.textContent = text;
        el.style.color = color;
        setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 3000);
    }

    document.getElementById('calPrev').addEventListener('click', () => {
        calMonth--;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', () => {
        calMonth++;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCalendar();
    });
    document.getElementById('multiClearSel').addEventListener('click', () => {
        multiSelectedDates.clear();
        renderCalendar();
        updateMultiCount();
    });

    document.getElementById('multiSubmit').addEventListener('click', async () => {
        if (isBusy) return;
        const sel = document.getElementById('multiStudent');
        const seat = sel.value;
        const selectedOpt = sel.options[sel.selectedIndex];
        const name = (selectedOpt && selectedOpt.dataset.name) || '';
        const leaveType = document.getElementById('multiLeaveType').value;

        if (!seat) { showMultiMsg('請先選擇學生', 'red'); return; }
        if (multiSelectedDates.size === 0) { showMultiMsg('請至少在日曆上選擇一天', 'red'); return; }

        const dates = Array.from(multiSelectedDates).sort();
        if (!confirm(`確定要幫 ${name} 登錄「${leaveType}」共 ${dates.length} 天嗎？`)) return;

        setBusy(true);
        showMultiMsg('送出中...', 'blue');
        try {
            const res = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'addBatch',
                    studentId: seat,
                    studentName: name,
                    leaveType: leaveType,
                    note: '',
                    dates: dates
                }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const result = await res.json();
            if (result.status === 'success') {
                invalidateCache();
                showMultiMsg(`已完成登錄 ${result.count || dates.length} 天`, 'green');
                multiSelectedDates.clear();
                renderCalendar();
                updateMultiCount();
            } else {
                showMultiMsg('登錄失敗：' + (result.message || '請重試，並確認後端已建立新版本'), 'red');
            }
        } catch (e) {
            showMultiMsg('送出失敗(網路錯誤)', 'red');
        } finally {
            setBusy(false);
        }
    });
    // =================== 複數天數紀錄 結束 ===================

    function toggleLoading(isLoading) {
        const loadingMsg = document.getElementById('loadingMsg');
        const recordsTable = document.getElementById('recordsTable');
        if (isLoading) {
            recordsTable.style.display = 'none';
            loadingMsg.style.display = 'block';
        } else {
            loadingMsg.style.display = 'none';
            recordsTable.style.display = 'table';
        }
    }

    // 把原始資料列轉成歷史紀錄並渲染
    function buildHistoryFrom(records) {
        const recordsBody = document.getElementById('recordsBody');
        if (!Array.isArray(records) || records.length === 0) {
            historyData = [];
            recordsBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">尚無紀錄</td></tr>';
            return;
        }

        const validData = [];
        for (let i = 0; i < records.length; i++) {
            const row = records[i];
            if (row[1] === '日期' || row[2] === '座號' || row[2] === '學號') continue;
            if (!row[1] || !row[3] || String(row[1]).trim() === '' || String(row[3]).trim() === '' || row[4] === '銷假') {
                continue;
            }
            validData.push({
                rowIdx: i + 1,
                rawDate: row[1] || '',
                displayDate: formatFullDate(row[1]),
                seat: parseInt(row[2]) || 0,
                name: row[3] || '',
                type: row[4] || ''
            });
        }

        historyData = validData;
        renderHistoryTable();
    }

    function setHistoryStatus(text, color) {
        const el = document.getElementById('historyStatus');
        if (el) {
            el.textContent = text;
            el.style.color = color || '#666';
        }
    }

    async function loadHistoryData(force = false) {
        // 先用手邊已有的資料立即顯示，避免盯著「載入中」
        const existing = getAnyRecords();
        if (existing) {
            toggleLoading(false);
            buildHistoryFrom(existing);
            setHistoryStatus('背景更新中...', '#0066cc');
        } else {
            toggleLoading(true);
            document.getElementById('recordsBody').innerHTML = '';
        }

        try {
            const result = await fetchAllData(force);
            toggleLoading(false);
            if (result.status === 'success') {
                buildHistoryFrom(result.data);
                const t = new Date();
                setHistoryStatus(`已更新 ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`, '#2e7d32');
            } else {
                setHistoryStatus('更新失敗', 'red');
            }
        } catch (error) {
            toggleLoading(false);
            if (!existing) {
                document.getElementById('recordsBody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">載入失敗</td></tr>';
            }
            setHistoryStatus('更新失敗（顯示的是先前資料）', 'red');
        }
    }

    function sortTable(colIndex) {
        if (currentSortCol === colIndex) {
            sortAsc = !sortAsc;
        } else {
            currentSortCol = colIndex;
            sortAsc = true;
        }
        renderHistoryTable();
    }

    function renderHistoryTable() {
        let filteredData = [...historyData];
        const filterVal = document.getElementById('filterStudent').value;

        if (filterVal) {
            filteredData = filteredData.filter(item => item.name === filterVal);
        }

        if (currentSortCol !== -1) {
            filteredData.sort((a, b) => {
                let valA, valB;
                if (currentSortCol === 0) {
                    valA = new Date(String(a.rawDate).replace(/-/g, '/')).getTime();
                    valB = new Date(String(b.rawDate).replace(/-/g, '/')).getTime();
                } else if (currentSortCol === 1) {
                    valA = a.seat; valB = b.seat;
                } else if (currentSortCol === 2) {
                    valA = a.name; valB = b.name;
                } else if (currentSortCol === 3) {
                    valA = a.type; valB = b.type;
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return a.seat - b.seat; // 同值時固定以座號排序
            });
        }

        const recordsBody = document.getElementById('recordsBody');

        if (filteredData.length === 0) {
            recordsBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">無符合條件的紀錄</td></tr>';
        } else {
            // 一次組好字串再賦值，避免在迴圈中反覆 innerHTML += 造成的效能問題
            recordsBody.innerHTML = filteredData.map(item => `
                    <tr>
                        <td>${escapeHtml(item.displayDate)}</td>
                        <td>${escapeHtml(item.seat)}</td>
                        <td>${escapeHtml(item.name)}</td>
                        <td>${escapeHtml(item.type)}</td>
                        <td>
                            <button class="action-btn-small edit-btn" data-action="edit" data-row="${item.rowIdx}" data-date="${escapeHtml(item.rawDate)}" data-seat="${escapeHtml(item.seat)}" data-name="${escapeHtml(item.name)}" data-type="${escapeHtml(item.type)}">編輯</button>
                            <button class="action-btn-small del-btn" data-action="delete" data-row="${item.rowIdx}" data-name="${escapeHtml(item.name)}" data-display="${escapeHtml(item.displayDate)}">刪除</button>
                        </td>
                    </tr>
                `).join('');
        }

        document.querySelectorAll('.sort-icon').forEach((icon, idx) => {
            icon.textContent = (idx === currentSortCol) ? (sortAsc ? '▲' : '▼') : '';
        });
    }

    function deleteRecord(rowIdx, studentName, displayDate) {
        if (isBusy) return;
        if (!confirm(`確定要刪除 ${studentName} 在 ${displayDate} 的紀錄嗎？\n(刪除後無法復原)`)) return;

        setBusy(true);
        toggleLoading(true);
        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: 'delete', row: rowIdx }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === 'success') {
                invalidateCache();
                alert('刪除成功');
                loadHistoryData();
            } else {
                alert('刪除失敗，請檢查後端是否已「建立新版本」');
                toggleLoading(false);
            }
        })
        .catch(err => {
            alert('網路錯誤');
            toggleLoading(false);
        })
        .finally(() => setBusy(false));
    }

    function openEditModal(rowIdx, dateStr, seat, name, type) {
        document.getElementById('editRowIdx').value = rowIdx;
        document.getElementById('editStudentLabel').textContent = `${seat}號 - ${name}`;
        document.getElementById('editDate').value = toInputDate(dateStr);
        document.getElementById('editLeaveType').value = type;
        document.getElementById('editModal').style.display = 'flex';
    }

    document.getElementById('saveEditBtn').addEventListener('click', () => {
        if (isBusy) return;
        const rowIdx = document.getElementById('editRowIdx').value;
        const newDate = document.getElementById('editDate').value;
        const newType = document.getElementById('editLeaveType').value;

        document.getElementById('editModal').style.display = 'none';
        setBusy(true);
        toggleLoading(true);

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: 'edit', row: rowIdx, date: newDate, leaveType: newType }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === 'success') {
                invalidateCache();
                alert('修改成功');
                loadHistoryData();
            } else {
                alert('修改失敗，請檢查後端是否已「建立新版本」');
                toggleLoading(false);
            }
        })
        .catch(err => {
            alert('網路錯誤');
            toggleLoading(false);
        })
        .finally(() => setBusy(false));
    });

</script>
